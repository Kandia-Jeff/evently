{% extends 'home.html' %}

{% block title %}Delete Event - Evently{% endblock %}

{% block content %}
<h2>Delete Event</h2>
<p>Are you sure you want to delete <strong>{{ event.title }}</strong>? This cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>
<a href="{% url 'organiser_dashboard' %}">Cancel</a>
{% endblock %}
