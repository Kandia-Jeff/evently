{% extends 'home.html' %}
{% block title %}Leave Feedback – {{ event.title }}{% endblock %}
{% block content %}
<h2>Leave Feedback for {{ event.title }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit Feedback</button>
</form>
<a href="/events/{{ event.pk }}/">Back to Event</a>
{% endblock %}
